name: CCTV端口扫描（极限优化版）

on:
  workflow_dispatch:
    inputs:
      max_concurrent:
        description: 'TCP并发数'
        required: false
        default: '2000'
        type: choice
        options:
          - '1000'
          - '2000'
          - '3000'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 优化版只需要30分钟
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp
          # uvloop可选，可提速30%
          pip install uvloop || echo "uvloop安装失败，使用标准asyncio"
      
      - name: 系统优化
        run: |
          # 增加文件描述符限制
          ulimit -n 65535
          echo "文件描述符限制: $(ulimit -n)"
          # 优化网络参数
          sudo sysctl -w net.ipv4.ip_local_port_range="1024 65535"
          sudo sysctl -w net.core.somaxconn=4096
          sudo sysctl -w net.ipv4.tcp_tw_reuse=1
          sudo sysctl -w net.ipv4.tcp_fin_timeout=10
      
      - name: 运行极限扫描器
        run: |
          echo "=========================================="
          echo "开始扫描: $(date)"
          echo "=========================================="
          python py/scanner.py
          echo "=========================================="
          echo "扫描结束: $(date)"
          echo "=========================================="
      
      - name: 显示扫描结果
        run: |
          if [ -f migu.txt ]; then
            echo ""
            echo "========== 扫描结果 =========="
            cat migu.txt
            echo "=============================="
            echo "有效目标数: $(wc -l < migu.txt)"
          fi
      
      - name: 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: cctv-scan-results-extreme
          path: migu.txt
          retention-days: 30
      
      - name: 提交结果到仓库
        if: success()
        run: |
          if [ -f migu.txt ] && [ -s migu.txt ]; then
            COUNT=$(wc -l < migu.txt)
            if [ "$COUNT" -gt 0 ]; then
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add migu.txt
              git commit -m "极限扫描结果: 发现 $COUNT 个目标 [skip ci]" || echo "无变化"
              git push
            fi
          fi