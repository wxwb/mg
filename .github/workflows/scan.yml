name: TV-Scan

on:
  workflow_dispatch:
    inputs:
      scan_mode:
        description: '扫描模式'
        required: false
        default: 'smart'
        type: choice
        options:
          - 'smart (智能模式-推荐)'
          - 'ultra (极限模式-最快)'
          - 'conservative (保守模式-最稳)'
      max_workers:
        description: '并发线程数'
        required: false
        default: '800'
        type: choice
        options:
          - '500'
          - '800'
          - '1000'
      enable_verify:
        description: '验证结果'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    - cron: '0 2 * * *'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade requests
          echo "依赖安装完成"
      
      - name: 系统优化
        run: |
          ulimit -n 65535
          echo "文件描述符限制: $(ulimit -n)"
          sudo sysctl -w net.ipv4.ip_local_port_range="1024 65535"
          sudo sysctl -w net.core.somaxconn=4096
          sudo sysctl -w net.ipv4.tcp_tw_reuse=1
          sudo sysctl -w net.ipv4.tcp_fin_timeout=10
          sudo sysctl -w net.ipv4.tcp_syn_retries=2
      
      - name: 创建结果目录
        run: |
          mkdir -p results
          mkdir -p logs
      
      - name: 运行扫描器
        run: |
          echo "=========================================="
          echo "开始扫描: $(date)"
          echo "扫描模式: ${{ github.event.inputs.scan_mode }}"
          echo "并发线程: ${{ github.event.inputs.max_workers }}"
          echo "=========================================="
          
          MODE="${{ github.event.inputs.scan_mode }}"
          WORKERS="${{ github.event.inputs.max_workers }}"
          VERIFY="${{ github.event.inputs.enable_verify }}"
          
          if [[ "$MODE" == *"smart"* ]]; then
            echo "使用智能模式扫描"
            python py/scanner_intelligent.py --mode smart --workers $WORKERS --verify $VERIFY --output migu.txt
          elif [[ "$MODE" == *"ultra"* ]]; then
            echo "使用极限模式扫描"
            python py/scanner_intelligent.py --mode ultra --workers $WORKERS --verify $VERIFY --output migu.txt
          else
            echo "使用保守模式扫描"
            python py/scanner_conservative.py --workers $WORKERS
          fi
          
          echo "=========================================="
          echo "扫描结束: $(date)"
          echo "=========================================="
          
          # 显示结果文件内容用于调试
          echo ""
          echo "========== 结果文件调试信息 =========="
          if [ -f migu.txt ]; then
            echo "文件存在: migu.txt"
            echo "文件大小: $(wc -c < migu.txt) 字节"
            echo "文件行数: $(wc -l < migu.txt) 行"
            echo "文件内容:"
            cat migu.txt
          else
            echo "文件不存在: migu.txt"
          fi
          echo "======================================"
      
      - name: 显示扫描结果
        run: |
          if [ -f migu.txt ] && [ -s migu.txt ]; then
            echo ""
            echo "========== 扫描结果 =========="
            cat migu.txt
            echo "=============================="
            COUNT=$(wc -l < migu.txt)
            echo "有效目标数: $COUNT"
            
            if [ $COUNT -gt 0 ]; then
              echo ""
              echo "========== 结果统计 =========="
              echo "按端口统计:"
              cat migu.txt | cut -d: -f2 | sort | uniq -c | while read line; do
                echo "  $line"
              done
            fi
          else
            echo "未找到结果文件或文件为空"
            # 创建空文件避免后续步骤失败
            touch migu.txt
          fi
      
      - name: 生成扫描报告
        if: success()
        run: |
          cat > scan_report.md << EOF
          # CCTV端口扫描报告
          
          ## 扫描信息
          - **扫描时间**: $(date '+%Y-%m-%d %H:%M:%S')
          - **扫描模式**: ${{ github.event.inputs.scan_mode }}
          - **并发线程**: ${{ github.event.inputs.max_workers }}
          - **运行环境**: ${{ runner.os }}
          
          ## 扫描结果
          \`\`\`
          $(cat migu.txt 2>/dev/null || echo "无结果")
          \`\`\`
          
          ## 统计信息
          - **发现目标数**: $(wc -l < migu.txt 2>/dev/null || echo 0)
          
          ---
          *报告由 GitHub Actions 自动生成*
          EOF
          
          echo "报告已生成: scan_report.md"
      
      - name: 上传扫描结果
        uses: actions/upload-artifact@v4
        with:
          name: cctv-scan-results-${{ github.run_id }}
          path: |
            migu.txt
            scan_report.md
            results/
          retention-days: 30
      
      - name: 提交结果到仓库
        if: success()
        run: |
          # 确保 migu.txt 存在
          if [ ! -f migu.txt ]; then
            touch migu.txt
          fi
          
          COUNT=$(wc -l < migu.txt)
          echo "结果文件行数: $COUNT"
          
          # 始终提交（即使为空也提交，避免后续问题）
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 备份到 results 目录
          if [ -f migu.txt ]; then
            cp migu.txt results/migu_$(date +%Y%m%d_%H%M%S).txt
            echo "已备份到 results 目录"
          fi
          
          # 添加并提交
          git add migu.txt results/ scan_report.md
          if [ $COUNT -gt 0 ]; then
            git commit -m "扫描结果更新: 发现 $COUNT 个CCTV目标 [skip ci]" || echo "无变化"
          else
            git commit -m "扫描完成: 未发现新目标 [skip ci]" || echo "无变化"
          fi
          git push || echo "推送失败或无需推送"
          
          # 显示最终结果
          echo ""
          echo "========== 最终结果 =========="
          cat migu.txt
          echo "=============================="

  cleanup:
    needs: scan
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 清理旧文件
        run: |
          echo "清理完成"
          # 可选: 清理超过30天的旧结果文件
          find results/ -name "migu_*.txt" -mtime +30 -delete 2>/dev/null || true